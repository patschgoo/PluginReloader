name: PluginReloader
main: com.patschgo.pluginreloader.PluginReloaderPlugin
version: 1.2.2
author: patschgo
commands:
  plreload:
    description: Reload plugins individually or sequentially with timeout protection
    usage: /plreload [pluginName|number|start-end|cancel]
    permission: pluginreloader.reload
  plcheck:
    description: Load newly added plugin jars without restart or /reload
    usage: /plcheck
    permission: pluginreloader.check
  plr:
    description: Reload PluginReloader from disk (for swapped jar updates)
    usage: /plr
    permission: pluginreloader.reload
  pldisable:
    description: Disable a loaded plugin by name
    usage: /pldisable <pluginName>
    permission: pluginreloader.disable
permissions:
  pluginreloader.*:
    description: Grants all PluginReloader permissions
    default: op
    children:
      pluginreloader.reload: true
      pluginreloader.check: true
      pluginreloader.disable: true
  pluginreloader.reload:
    description: Allows plugin reloading (single or sequential) and cancellation
    default: op
  pluginreloader.check:
    description: Allows loading new plugin jars via /plcheck
    default: op
  pluginreloader.disable:
    description: Allows disabling loaded plugins via /pldisable
    default: op
